<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>CloudFix — Marketing UI Kit</title>
<link rel="stylesheet" href="../../colors_and_type.css">
<link rel="icon" href="../../assets/favicon.png">
<style>html, body { margin: 0; padding: 0; }</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="Components.jsx"></script>
<script type="text/babel">
  function App() {
    return (
      <>
        <MarketingHeader active="home" />
        <Hero />
        <StatBanner />
        <TrustTrio />
        <SplitFeature
          eyebrow="BEYOND ALERTS"
          title="Alerts don't save money. Fixes do."
          body="Most cost tools surface a list of opportunities. CloudFix does the work for you — running 30+ tested fixers across EBS, S3, RDS, EC2, CloudTrail, and more. You spend minutes per week, not hours."
          stat="15-60%"
          statLabel="Savings per AWS service"
          image="../../assets/refs/screenshot-recommendation-example.png"
        />
        <SplitFeature
          flip
          eyebrow="DISCOUNT OPTIMIZATION"
          title="Up to 55% more savings, no restrictive commitments."
          body="RightSpend optimizes AWS discount programs to deliver maximum savings without giving up instance and commitment flexibility. Set it once. We manage the rest."
          stat="55%"
          statLabel="Discount on EC2 spend"
          image="../../assets/refs/screenshot-recommendations-overlay.png"
        />
        <CTAStrip />
        <Footer />
      </>
    );
  }
  ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
