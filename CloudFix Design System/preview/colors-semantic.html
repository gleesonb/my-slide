<!doctype html>
<html><head><meta charset="utf-8"><title>Semantic colors</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 20px; background: #fff; font-family: var(--font-body); }
  .row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
  .item { border-radius: 10px; overflow: hidden; box-shadow: var(--shadow-1); }
  .swatch { height: 60px; padding: 10px 12px; color: #fff; display: flex; align-items: flex-end; font-family: var(--font-display); font-weight: 700; font-size: 13px; letter-spacing: 0.04em; }
  .meta { padding: 8px 12px; background: #fff; }
  .meta .hex { font-family: var(--font-mono); font-size: 11px; color: var(--cf-fg-2); }
  .meta .role { font-size: 11px; color: var(--cf-fg-3); margin-top: 2px; }
  .pill { display: inline-flex; align-items: center; gap: 4px; padding: 3px 8px; border-radius: 999px; font-size: 11px; font-weight: 600; margin-top: 6px; }
</style></head>
<body>
<div class="row">
  <div class="item">
    <div class="swatch" style="background:#1FB36B">Success</div>
    <div class="meta"><div class="hex">#1FB36B</div><div class="role">Realized savings, completion</div>
      <span class="pill" style="background:#DEF6EA;color:#1FB36B">$544K saved</span></div>
  </div>
  <div class="item">
    <div class="swatch" style="background:#2A8FEA">Info</div>
    <div class="meta"><div class="hex">#2A8FEA</div><div class="role">Default actions, links</div>
      <span class="pill" style="background:#DCEBFB;color:#2A8FEA">Ready</span></div>
  </div>
  <div class="item">
    <div class="swatch" style="background:#ED8705">Warn</div>
    <div class="meta"><div class="hex">#ED8705</div><div class="role">Pending, needs review</div>
      <span class="pill" style="background:#FCEBD2;color:#C97000">Pending approval</span></div>
  </div>
  <div class="item">
    <div class="swatch" style="background:#D14545">Danger</div>
    <div class="meta"><div class="hex">#D14545</div><div class="role">Errors, destructive</div>
      <span class="pill" style="background:#FADCDC;color:#D14545">Failed</span></div>
  </div>
</div>
</body></html>
