<!doctype html>
<html><head><meta charset="utf-8"><title>Type — display</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>body{margin:0;padding:20px;background:#fff}
.row{display:flex;align-items:baseline;gap:14px;padding:10px 0;border-bottom:1px solid var(--cf-divider)}
.row:last-child{border:0}
.meta{font-family:var(--font-mono);font-size:11px;color:var(--cf-fg-3);width:160px;flex-shrink:0}
.spec{flex:1;color:var(--cf-navy);font-family:var(--font-display);line-height:1}
</style></head><body>
<div class="row"><div class="meta">Display · 800 · 64</div><div class="spec" style="font-size:56px;font-weight:800;letter-spacing:-.02em">Cut your AWS bill</div></div>
<div class="row"><div class="meta">H1 · 800 · 44</div><div class="spec" style="font-size:38px;font-weight:800">Find. Fix. Save. Repeat.</div></div>
<div class="row"><div class="meta">H2 · 700 · 30</div><div class="spec" style="font-size:28px;font-weight:700">Pay less for AWS</div></div>
<div class="row"><div class="meta">H3 · 700 · 22</div><div class="spec" style="font-size:22px;font-weight:700">Recommendations</div></div>
<div class="row"><div class="meta">Eyebrow · 700 · 13</div><div class="spec" style="font-family:var(--font-display);font-size:13px;font-weight:700;color:var(--cf-blue);letter-spacing:.12em;text-transform:uppercase">BEYOND AWS</div></div>
</body></html>
