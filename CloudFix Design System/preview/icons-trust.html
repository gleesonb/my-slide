<!doctype html>
<html><head><meta charset="utf-8"><title>Trust icons</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>body{margin:0;padding:24px;background:#fff;font-family:var(--font-body)}
.row{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;text-align:center}
.cell img{height:64px;display:block;margin:0 auto 12px}
.cell h4{font-family:var(--font-display);font-size:14px;font-weight:700;color:var(--cf-navy);margin:0 0 4px}
.cell p{font-size:12px;color:var(--cf-fg-2);margin:0;line-height:1.4}
</style></head><body>
<div class="row">
  <div class="cell"><img src="../assets/icons/risk-free.svg"><h4>Risk-Free</h4><p>Every fixer follows AWS advisories and is extensively tested.</p></div>
  <div class="cell"><img src="../assets/icons/zero-downtime.svg"><h4>Zero Downtime</h4><p>Only optimizations that require no service interruptions.</p></div>
  <div class="cell"><img src="../assets/icons/least-privilege.svg"><h4>Least Privilege</h4><p>Read access by default. You approve every change.</p></div>
</div>
</body></html>
