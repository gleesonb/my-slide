<!doctype html>
<html><head><meta charset="utf-8"><title>Big stat</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>body{margin:0;padding:24px;background:#fff;font-family:var(--font-body)}
.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:18px}
.stat .num{font-family:var(--font-display);font-weight:800;font-size:48px;line-height:1;letter-spacing:-.02em;color:var(--cf-navy)}
.stat .lab{font-family:var(--font-display);font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--cf-fg-3);margin-top:8px}
.stat .sub{font-size:13px;color:var(--cf-fg-2);margin-top:4px;line-height:1.4}
.stat.accent .num{color:var(--cf-blue)}
.stat.savings .num{color:var(--cf-success)}
</style></head><body>
<div class="grid">
  <div class="stat"><div class="num">$2B</div><div class="lab">AWS spend managed</div></div>
  <div class="stat accent"><div class="num">15-60%</div><div class="lab">Savings per service</div></div>
  <div class="stat savings"><div class="num">$544K</div><div class="lab">Realized savings</div><div class="sub">across 34 fixers</div></div>
  <div class="stat"><div class="num">500+</div><div class="lab">Industry leaders</div></div>
</div>
</body></html>
