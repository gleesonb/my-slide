<!doctype html>
<html><head><meta charset="utf-8"><title>Spacing & radii</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>body{margin:0;padding:20px;background:#fff;font-family:var(--font-body);font-size:12px}
h4{font-family:var(--font-display);font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--cf-fg-3);margin:0 0 10px}
.section{margin-bottom:18px}
.scale{display:flex;align-items:flex-end;gap:8px}
.box{background:var(--cf-blue-100);border:1px solid var(--cf-blue);position:relative}
.box span{position:absolute;top:-16px;left:50%;transform:translateX(-50%);font-family:var(--font-mono);font-size:10px;color:var(--cf-fg-2)}
.radii{display:flex;gap:12px;align-items:center}
.r{width:60px;height:60px;background:var(--cf-navy);display:flex;align-items:center;justify-content:center;color:#fff;font-family:var(--font-mono);font-size:11px}
</style></head><body>
<div class="section">
<h4>Spacing scale</h4>
<div class="scale">
  <div class="box" style="width:4px;height:4px"><span>4</span></div>
  <div class="box" style="width:8px;height:8px"><span>8</span></div>
  <div class="box" style="width:12px;height:12px"><span>12</span></div>
  <div class="box" style="width:16px;height:16px"><span>16</span></div>
  <div class="box" style="width:24px;height:24px"><span>24</span></div>
  <div class="box" style="width:32px;height:32px"><span>32</span></div>
  <div class="box" style="width:48px;height:48px"><span>48</span></div>
  <div class="box" style="width:64px;height:64px"><span>64</span></div>
</div>
</div>
<div class="section">
<h4>Border radius</h4>
<div class="radii">
  <div class="r" style="border-radius:4px">4</div>
  <div class="r" style="border-radius:6px">6</div>
  <div class="r" style="border-radius:10px">10</div>
  <div class="r" style="border-radius:16px">16</div>
  <div class="r" style="border-radius:24px">24</div>
  <div class="r" style="border-radius:999px">pill</div>
</div>
</div>
</body></html>
