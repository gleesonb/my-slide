<!doctype html>
<html><head><meta charset="utf-8"><title>Neutrals</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 20px; background: #fff; }
  .row { display: grid; grid-template-columns: repeat(9, 1fr); gap: 4px; }
  .sw { aspect-ratio: 1/1.6; border-radius: 8px; padding: 8px; display: flex; flex-direction: column; justify-content: space-between; box-shadow: 0 0 0 1px rgba(15,27,45,.06) inset; }
  .nm { font-family: var(--font-display); font-weight: 700; font-size: 10px; letter-spacing: 0.04em; }
  .hx { font-family: var(--font-mono); font-size: 9.5px; opacity: 0.85; line-height: 1; }
  .dark { color: #fff; } .light { color: var(--cf-ink); }
</style></head>
<body>
<div class="row">
  <div class="sw dark" style="background:#0F1B2D"><div class="nm">Ink</div><div class="hx">#0F1B2D</div></div>
  <div class="sw dark" style="background:#1B2A41"><div class="nm">FG 1</div><div class="hx">#1B2A41</div></div>
  <div class="sw dark" style="background:#4A5A75"><div class="nm">FG 2</div><div class="hx">#4A5A75</div></div>
  <div class="sw dark" style="background:#7A8AA3"><div class="nm">FG 3</div><div class="hx">#7A8AA3</div></div>
  <div class="sw light" style="background:#A9B5C7"><div class="nm">FG 4</div><div class="hx">#A9B5C7</div></div>
  <div class="sw light" style="background:#D5DDE8"><div class="nm">Border</div><div class="hx">#D5DDE8</div></div>
  <div class="sw light" style="background:#E4EAF1"><div class="nm">Divider</div><div class="hx">#E4EAF1</div></div>
  <div class="sw light" style="background:#F5F8FB"><div class="nm">Surf 2</div><div class="hx">#F5F8FB</div></div>
  <div class="sw light" style="background:#FBFCFE"><div class="nm">Surf 1</div><div class="hx">#FBFCFE</div></div>
</div>
</body></html>
